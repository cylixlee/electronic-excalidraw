name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ext: AppImage
            artifact: installer-ubuntu-latest
          - os: macos-latest
            ext: dmg
            artifact: installer-macos-latest
          - os: windows-latest
            ext: exe
            artifact: installer-windows-latest
    outputs:
      ext: ${{ matrix.ext }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Electron app
        run: yarn --cwd ./excalidraw-app electron:build
        env:
          ELECTRON: true
          VITE_APP_ENABLE_PWA: false

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: excalidraw-app/release/*.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: installer-*
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
